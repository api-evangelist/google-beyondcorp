info:
  label: Google BeyondCorp API
  description: The BeyondCorp API provides programmatic access to manage zero-trust access controls for enterprise resources.
    It enables creating and managing app connectors, app connections, client connector services, and security gateways for
    zero-trust enterprise deployments without requiring a traditional VPN.
  tags:
  - Google
  - Beyondcorp
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
