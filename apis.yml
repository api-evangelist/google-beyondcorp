apis:
  - aid: google-beyondcorp:beyondcorp
    name: BeyondCorp API
    description: >-
      The BeyondCorp API provides programmatic access to manage zero-trust access
      controls for enterprise resources. Developers can use the API to create and
      manage app connectors, app connections, and client connector services that
      enable secure access to private applications without a VPN. The API supports
      managing gateways, connection policies, and security configurations for
      zero-trust enterprise deployments.
