aid: google-beyondcorp
name: Google BeyondCorp
description: >-
  Google BeyondCorp Enterprise is a zero-trust security platform that enables
  secure access to applications and resources without requiring a traditional
  VPN. It provides identity and context-aware access controls for enterprise
  resources, enabling organizations to implement zero-trust access policies
  across multi-cloud and on-premises environments using app connectors and
  client connectors.
